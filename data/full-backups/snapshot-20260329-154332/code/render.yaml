services:
  - type: web
    name: vlera-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/vlera.sqlite
      - key: UPLOADS_PATH
        value: /var/data/uploads
      - key: FRONTEND_ORIGIN
        value: "*"
      - key: ADMIN_EMAIL
        value: admin@vlera.com
      - key: ADMIN_PASSWORD
        value: vlera123
      - key: ADMIN_TOKEN_SECRET
        value: vlera-secure-change-this-in-render
      - key: ADMIN_TOKEN_TTL_HOURS
        value: "24"
    disk:
      name: vlera-data
      mountPath: /var/data
      sizeGB: 1
