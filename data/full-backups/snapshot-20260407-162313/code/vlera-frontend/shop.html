<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | VLERA</title>
  <link rel="stylesheet" href="./assets/css/style.css?v=20260330-129">
</head>
<body>
  <div class="topbar" id="i18n-shop-topbar">Shfleto produktet</div>
  <header class="header">
    <div class="container header-inner">
      <a class="logo" href="index.html"><strong>VLERA</strong><span>Luxury Home</span></a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="categories.html">Kategorite</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="track-order.html" id="i18n-nav-track">Statusi i Porosise</a>
      </nav>
      <div class="header-actions">
        <form data-search-form><input name="q" placeholder="Kerko produkte..." style="width:160px;height:38px"></form>
        <a class="icon-btn" href="wishlist.html">&#9825;</a>
        <a class="cart-btn" href="cart.html" aria-label="Shporta">&#128722;<strong data-cart-count>0</strong></a>
      </div>
    </div>
  </header>
  <main class="container">
    <section class="page-head"><h1 id="i18n-shop-title">Shop</h1></section>
    <div class="filters shop-filters">
      <input id="shop-search" placeholder="Kerko produkt...">
      <select id="shop-category">
        <option value="">Kategoria</option>
      </select>
      <select id="shop-sort">
        <option value="newest">Me te rejat</option>
        <option value="price_asc">Cmimi ne rritje</option>
        <option value="price_desc">Cmimi ne ulje</option>
      </select>
      <input id="shop-min-price" type="number" step="0.01" min="0" placeholder="Cmimi min">
      <input id="shop-max-price" type="number" step="0.01" min="0" placeholder="Cmimi max">
      <label class="shop-toggle"><input id="shop-top-sold" type="checkbox"> Vetem Top Sold</label>
      <label class="shop-toggle"><input id="shop-new-only" type="checkbox"> Vetem New</label>
      <button id="shop-reset-filters" class="small-btn" type="button">Pastro Filtrat</button>
    </div>
    <div class="shop-chips" id="shop-quick-chips">
      <button class="chip-btn" type="button" data-shop-chip="top">Top Sold</button>
      <button class="chip-btn" type="button" data-shop-chip="new">New</button>
      <button class="chip-btn" type="button" data-shop-chip="under25">Nen 25 &euro;</button>
      <button class="chip-btn" type="button" data-shop-chip="under50">Nen 50 &euro;</button>
      <button class="chip-btn" type="button" data-shop-chip="discount">Me zbritje</button>
      <button class="chip-btn chip-clear" type="button" data-shop-chip="clear">Pastro</button>
    </div>
    <div id="shop-products" class="product-grid"></div>
    <div class="load-more-wrap"><button id="shop-products-more" class="btn load-more-btn hidden" type="button">Me shume produkte</button></div>
  </main>
  <footer class="footer"><div class="container footer-bottom">&copy; <span data-year></span> VLERA Luxury Home</div></footer>
  <script src="./assets/js/main.js?v=20260330-113"></script>
</body>
</html>
