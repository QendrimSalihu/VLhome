<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt | VLERA</title>
  <link rel="stylesheet" href="./assets/css/style.css?v=20260328-43">
</head>
<body>
  <div class="topbar" id="i18n-contact-topbar">Kontakt</div>
  <header class="header">
    <div class="container header-inner">
      <a class="logo" href="index.html"><strong>VLERA</strong><span>Luxury Home</span></a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="categories.html">Kategorite</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="header-actions">
        <a class="cart-btn" href="cart.html" aria-label="Shporta">&#128722;<strong data-cart-count>0</strong></a>
      </div>
    </div>
  </header>
  <main class="container">
    <section class="page-head"><h1 id="i18n-contact-title">Kontakt</h1></section>
    <section class="split" style="grid-template-columns:1fr;gap:20px">
      <form id="contact-form" class="panel" style="padding:28px">
        <h3 id="i18n-contact-form-title" style="margin-top:0">Na shkruaj</h3>
        <div class="filters" style="grid-template-columns:1fr 1fr;gap:14px">
          <input id="i18n-contact-name" name="fullName" placeholder="Emri" style="height:52px;font-size:16px" required>
          <input id="i18n-contact-email" name="email" placeholder="Email" style="height:52px;font-size:16px">
          <input id="i18n-contact-phone" name="phone" placeholder="Telefoni" style="grid-column:1/-1;height:52px;font-size:16px">
          <textarea id="i18n-contact-message" name="message" placeholder="Mesazhi" style="grid-column:1/-1;min-height:220px;font-size:16px" required></textarea>
        </div>
        <button type="submit" id="i18n-contact-btn" class="btn btn-primary" style="margin-top:14px;height:48px;padding:0 22px">Dergo Mesazhin</button>
      </form>
      <aside class="panel" style="padding:28px">
        <h3 id="i18n-contact-details-title" style="margin-top:0">Detajet</h3>
        <p id="contact-phone-text" style="font-size:18px;line-height:1.9">Tel: 076 288 887</p>
        <p id="contact-email-text" style="font-size:18px;line-height:1.9">Email: vlerahomee@gmail.com</p>
        <p style="font-size:18px;line-height:1.9">Instagram: <a id="contact-instagram-link" target="_blank" href="https://www.instagram.com/vlerahomee?igsh=dDBudTY5dmwyM240">@vlerahomee</a></p>
      </aside>
    </section>
  </main>
  <footer class="footer"><div class="container footer-bottom">&copy; <span data-year></span> VLERA Luxury Home</div></footer>
  <script src="./assets/js/main.js?v=20260328-46"></script>
</body>
</html>
